# ============================================================
# RBAC Boilerplates — Role, ClusterRole, Bindings, ServiceAccount
# ============================================================

# ─── 1. ServiceAccount ────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-service-account
  namespace: default

---
# ─── 2. Role (namespace-scoped permissions) ───────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: my-role
  namespace: default
rules:
  - apiGroups: [""]                  # "" = core API group
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "create", "delete"]

---
# ─── 3. RoleBinding (bind Role to user/group/serviceaccount) ─────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: my-rolebinding
  namespace: default
subjects:
  # Bind to a ServiceAccount
  - kind: ServiceAccount
    name: my-service-account
    namespace: default

  # Bind to a User
  # - kind: User
  #   name: alice@example.com
  #   apiGroup: rbac.authorization.k8s.io

  # Bind to a Group
  # - kind: Group
  #   name: developers
  #   apiGroup: rbac.authorization.k8s.io

roleRef:
  kind: Role
  name: my-role
  apiGroup: rbac.authorization.k8s.io

---
# ─── 4. ClusterRole (cluster-wide permissions) ───────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: my-cluster-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "persistentvolumes"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]

  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Full access to everything (use carefully!)
  # - apiGroups: ["*"]
  #   resources: ["*"]
  #   verbs: ["*"]

---
# ─── 5. ClusterRoleBinding ────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: my-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: my-service-account
    namespace: default
roleRef:
  kind: ClusterRole
  name: my-cluster-role
  apiGroup: rbac.authorization.k8s.io

---
# ─── 6. Read-Only Viewer Role (common pattern) ────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: readonly-viewer
rules:
  - apiGroups: ["", "apps", "batch", "extensions", "networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
