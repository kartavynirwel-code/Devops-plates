# ============================================================
# ConfigMap Boilerplates
# ============================================================

# ─── 1. Simple Key-Value ConfigMap ───────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: my-configmap
  namespace: default
data:
  # Key-value pairs
  APP_ENV: "production"
  LOG_LEVEL: "info"
  DB_HOST: "postgres-svc"
  DB_PORT: "5432"
  DB_NAME: "mydb"
  MAX_CONNECTIONS: "100"

---
# ─── 2. ConfigMap with File Contents ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: my-file-configmap
  namespace: default
data:
  # These become files when mounted as a volume
  app.properties: |
    server.port=8080
    spring.datasource.url=jdbc:postgresql://postgres-svc:5432/mydb
    spring.jpa.hibernate.ddl-auto=update

  nginx.conf: |
    server {
      listen 80;
      server_name _;
      location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }

  config.yaml: |
    database:
      host: postgres-svc
      port: 5432
      name: mydb
    cache:
      host: redis-svc
      port: 6379
    logging:
      level: info

---
# ============================================================
# Secret Boilerplates
# ============================================================

# ─── 3. Generic Secret (values must be base64 encoded) ───────────────────────
# To encode:  echo -n "my-password" | base64
# To decode:  echo "bXktcGFzc3dvcmQ=" | base64 --decode
apiVersion: v1
kind: Secret
metadata:
  name: my-secret
  namespace: default
type: Opaque
data:
  username: YWRtaW4=               # admin
  password: bXktcGFzc3dvcmQ=       # my-password
  api_key: c3VwZXItc2VjcmV0LWtleQ==

---
# ─── 4. Secret with plaintext values (stringData) ────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: my-secret-plain
  namespace: default
type: Opaque
stringData:
  # No base64 needed — k8s encodes automatically
  username: "admin"
  password: "my-password"
  connection_string: "postgresql://admin:my-password@postgres-svc:5432/mydb"

---
# ─── 5. Docker Registry Secret ────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: default
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>
# Create with:
# kubectl create secret docker-registry docker-registry-secret \
#   --docker-server=registry.example.com \
#   --docker-username=myuser \
#   --docker-password=mypassword

---
# ─── 6. TLS Secret ────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: my-tls-secret
  namespace: default
type: kubernetes.io/tls
data:
  tls.crt: <BASE64_ENCODED_CERT>
  tls.key: <BASE64_ENCODED_KEY>
# Create with:
# kubectl create secret tls my-tls-secret --cert=tls.crt --key=tls.key
